<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asteroids Arcade</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="Asteroids Arcade Spiel">
      <h1>Asteroids</h1>
      <p class="subtitle">Retro Arcade · Vanilla HTML/CSS/JS</p>

      <section class="hud" aria-live="polite">
        <span id="score">Score: 0</span>
        <span id="lives">Leben: 3</span>
        <span id="status">Status: Bereit</span>
      </section>

      <canvas id="game" width="900" height="600" role="img" aria-label="Spielfeld"></canvas>

      <section class="controls-info">
        <strong>Steuerung:</strong>
        <span>← / → drehen</span>
        <span>↑ Schub</span>
        <span>Leertaste schießen</span>
        <span>R neu starten (bei Game Over)</span>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
